model:
  name: "TinyLlama-1.1B-Chat"
  display_name: "TinyLlama 1.1B Chat v1.0"
  source: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  format: "GGUF"
  file: "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
  parameters: "1.1B"
  quantization: "Q4_K_M"
  context_length: 4096

profiles:
  balanced:
    description: "Reasonable tradeoff between throughput and latency. Default profile."
    n_ctx: 1536
    n_batch: 256
    max_concurrent_requests: 2
    generation:
      max_tokens: 512
      temperature: 0.7
      top_p: 0.9
      repeat_penalty: 1.1

  throughput:
    description: "Maximize tokens-per-second under concurrent load. Larger batches, more parallelism."
    n_ctx: 2048
    n_batch: 512
    max_concurrent_requests: 4
    generation:
      max_tokens: 1024
      temperature: 0.7
      top_p: 0.9
      repeat_penalty: 1.1

  latency:
    description: "Minimize time-to-first-token for individual requests. Smaller context, no queuing."
    n_ctx: 512
    n_batch: 64
    max_concurrent_requests: 1
    generation:
      max_tokens: 256
      temperature: 0.7
      top_p: 0.9
      repeat_penalty: 1.1
